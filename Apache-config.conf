# VANTHEX ENGINE - Apache VirtualHost Configuration
# Owner: @SagarXModder
# Complete Production-Ready Config

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    ServerName localhost
    
    # ============================================
    # ENABLE MOD_REWRITE
    # ============================================
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Disable server signature
        ServerSignature Off
    </Directory>
    
    # ============================================
    # CORS HEADERS (Global)
    # ============================================
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "POST, GET, OPTIONS, PUT, DELETE, PATCH"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-API-Key"
    Header always set Access-Control-Max-Age "86400"
    Header always set Access-Control-Expose-Headers "Content-Length, Content-Range"
    
    # Handle preflight OPTIONS requests
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]
    
    # ============================================
    # SECURITY HEADERS
    # ============================================
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # ============================================
    # COMPRESSION (GZIP)
    # ============================================
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE text/javascript application/javascript
        AddOutputFilterByType DEFLATE application/json application/xml
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>
    
    # ============================================
    # BROWSER CACHING
    # ============================================
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/json "access plus 0 seconds"
    </IfModule>
    
    # ============================================
    # PROTECT SENSITIVE FILES
    # ============================================
    <FilesMatch "^\\.">
        Order allow,deny
        Deny from all
    </FilesMatch>
    
    <FilesMatch "\\.(env|sql|log|md|git|svn)$">
        Order allow,deny
        Deny from all
    </FilesMatch>
    
    <Files "config.php">
        Order allow,deny
        Deny from all
    </Files>
    
    # ============================================
    # PHP SETTINGS
    # ============================================
    php_value upload_max_filesize 64M
    php_value post_max_size 64M
    php_value max_execution_time 300
    php_value max_input_time 300
    php_value memory_limit 256M
    php_value max_input_vars 3000
    
    # ============================================
    # LOGGING
    # ============================================
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
    
    # ============================================
    # RATE LIMITING (Requires mod_evasive or mod_security)
    # ============================================
    # <IfModule mod_evasive24.c>
    #     DOSHashTableSize 3097
    #     DOSPageCount 10
    #     DOSSiteCount 50
    #     DOSPageInterval 1
    #     DOSSiteInterval 1
    #     DOSBlockingPeriod 10
    # </IfModule>
</VirtualHost>

# ============================================
# SSL CONFIGURATION (Uncomment for HTTPS)
# ============================================
# <VirtualHost *:443>
#     ServerAdmin webmaster@localhost
#     DocumentRoot /var/www/html
#     
#     SSLEngine on
#     SSLCertificateFile /etc/ssl/certs/server.crt
#     SSLCertificateKeyFile /etc/ssl/private/server.key
#     
#     # SSL Security
#     SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
#     SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
#     SSLHonorCipherOrder on
#     
#     Include /etc/apache2/sites-available/000-default.conf
# </VirtualHost>
'''

# 2. Create .htaccess with even more features
htaccess = '''# VANTHEX ENGINE - Apache .htaccess
# Owner: @SagarXModder
# Complete Security & Performance Config

# ============================================
# ENABLE REWRITE ENGINE
# ============================================
RewriteEngine On

# ============================================
# HANDLE PREFLIGHT OPTIONS FOR CORS
# ============================================
RewriteCond %{REQUEST_METHOD} OPTIONS
RewriteRule ^(.*)$ $1 [R=200,L]

# ============================================
# SEO FRIENDLY URLS (Optional)
# ============================================
# RewriteRule ^api/([a-zA-Z0-9_-]+)$ api.php?action=$1 [QSA,L]

# ============================================
# REDIRECT HTTP TO HTTPS (Uncomment for production)
# ============================================
# RewriteCond %{HTTPS} off
# RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

# ============================================
# WWW TO NON-WWW REDIRECT (Optional)
# ============================================
# RewriteCond %{HTTP_HOST} ^www\\.(.*)$ [NC]
# RewriteRule ^(.*)$ https://%1/$1 [R=301,L]

# ============================================
# PROTECT SENSITIVE FILES & DIRECTORIES
# ============================================
<FilesMatch "^\\.">
    Order allow,deny
    Deny from all
</FilesMatch>

<FilesMatch "\\.(env|sql|log|md|ini|sh|bak|swp|git|svn)$">
    Order allow,deny
    Deny from all
</FilesMatch>

<Files "config.php">
    Order allow,deny
    Deny from all
</Files>

<Files "database.sql">
    Order allow,deny
    Deny from all
</Files>

# Protect directories
RedirectMatch 403 /\\.git/
RedirectMatch 403 /\\.env
RedirectMatch 403 /vendor/
RedirectMatch 403 /node_modules/

# ============================================
# GZIP COMPRESSION
# ============================================
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
    AddOutputFilterByType DEFLATE text/javascript application/javascript
    AddOutputFilterByType DEFLATE application/json application/xml
    AddOutputFilterByType DEFLATE image/svg+xml
    AddOutputFilterByType DEFLATE application/x-font-ttf application/x-font-opentype
    
    # Don't compress images (already compressed)
    SetEnvIfNoCase Request_URI \\.(?:gif|jpe?g|png|webp)$ no-gzip dont-vary
    
    # Make sure proxies don't deliver wrong content
    Header append Vary User-Agent env=!dont-vary
</IfModule>

# ============================================
# BROWSER CACHING
# ============================================
<IfModule mod_expires.c>
    ExpiresActive On
    
    # Images
    ExpiresByType image/jpg "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType image/gif "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/webp "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType image/x-icon "access plus 1 year"
    
    # CSS & JS
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    
    # Fonts
    ExpiresByType font/ttf "access plus 1 year"
    ExpiresByType font/otf "access plus 1 year"
    ExpiresByType font/woff "access plus 1 year"
    ExpiresByType font/woff2 "access plus 1 year"
    
    # HTML & API
    ExpiresByType text/html "access plus 0 seconds"
    ExpiresByType application/json "access plus 0 seconds"
</IfModule>

# ============================================
# SECURITY HEADERS
# ============================================
<IfModule mod_headers.c>
    # Prevent clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"
    
    # Prevent MIME type sniffing
    Header always set X-Content-Type-Options "nosniff"
    
    # XSS Protection
    Header always set X-XSS-Protection "1; mode=block"
    
    # Referrer Policy
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Permissions Policy
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()"
    
    # Content Security Policy (Adjust as needed)
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://code.jquery.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; connect-src 'self'; media-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    
    # Remove server info
    Header always unset X-Powered-By
    Header always unset Server
</IfModule>

# ============================================
# DISABLE SERVER SIGNATURE
# ============================================
ServerSignature Off

# ============================================
# PREVENT DIRECTORY LISTING
# ============================================
Options -Indexes

# ============================================
# DEFAULT CHARSET
# ============================================
AddDefaultCharset UTF-8

# ============================================
# PHP SETTINGS (If running as mod_php)
# ============================================
<IfModule mod_php.c>
    php_value upload_max_filesize 64M
    php_value post_max_size 64M
    php_value max_execution_time 300
    php_value max_input_time 300
    php_value memory_limit 256M
    php_flag display_errors off
    php_flag log_errors on
    php_value error_log /var/log/apache2/php_errors.log
</IfModule>

# ============================================
# ERROR DOCUMENTS (Optional)
# ============================================
ErrorDocument 403 /403.html
ErrorDocument 404 /404.html
ErrorDocument 500 /500.html